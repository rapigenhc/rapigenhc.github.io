<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>래피젠 | 예약 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-black text-[#F27405]">래피젠헬스케어</h1>
                <p class="text-gray-500 text-sm mt-1">예약 관리자 시스템</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="adminId" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-[#F27405]" placeholder="아이디 (admin)">
                <input type="password" id="adminPw" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-[#F27405]" placeholder="비밀번호 (1234)">
                <button id="loginBtn" class="w-full bg-gray-900 text-white font-bold py-3 rounded-lg hover:bg-black transition">로그인</button>
            </div>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden min-h-screen flex-col">
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
            <h1 class="text-xl font-black text-gray-900">상담 접수 관리</h1>
            <div class="flex items-center gap-4">
                <span id="totalCount" class="text-sm font-bold text-gray-500">총 0건</span>
                <button id="logoutBtn" class="text-xs bg-gray-100 text-gray-600 px-3 py-1.5 rounded hover:bg-gray-200 font-medium">로그아웃</button>
            </div>
        </header>

        <main class="flex-1 p-6 overflow-x-auto">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden min-w-[800px]">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 border-b border-gray-200 text-gray-600">
                        <tr>
                            <th class="px-6 py-4 font-bold w-48">접수일시</th>
                            <th class="px-6 py-4 font-bold w-32">이름</th>
                            <th class="px-6 py-4 font-bold w-40">연락처</th>
                            <th class="px-6 py-4 font-bold">선택 패키지</th>
                            <th class="px-6 py-4 font-bold w-40 text-center">예약상태</th>
                        </tr>
                    </thead>
                    <tbody id="reservation-list" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
            
            <div class="flex justify-center items-center gap-4 mt-6">
                <button id="prevPageBtn" disabled class="px-4 py-2 text-sm font-bold text-gray-500 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm">
                    &larr; 이전
                </button>
                <span id="pageIndicator" class="text-sm font-bold text-gray-700">1 페이지</span>
                <button id="nextPageBtn" disabled class="px-4 py-2 text-sm font-bold text-gray-700 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm">
                    다음 &rarr;
                </button>
            </div>
            
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy, limit, startAfter } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // rapigenhc config
        const firebaseConfig = {
            apiKey: "AIzaSyDXL8vuvgnNJmHU0fZwjquIgfD7bHZdA6c",
            authDomain: "rapigenhc-event.firebaseapp.com",
            projectId: "rapigenhc-event",
            storageBucket: "rapigenhc-event.firebasestorage.app",
            messagingSenderId: "893881210369",
            appId: "1:893881210369:web:e92344136212280e589200",
            measurementId: "G-GM4ZWH6XEY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI 요소
        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const reservationList = document.getElementById('reservation-list');
        
        // 페이지 네비게이션 UI
        const prevPageBtn = document.getElementById('prevPageBtn');
        const nextPageBtn = document.getElementById('nextPageBtn');
        const pageIndicator = document.getElementById('pageIndicator');

        // 🌟 페이지네이션을 위한 전역 변수
        const PAGE_SIZE = 10; // 한 페이지에 보여줄 개수
        let currentPage = 1;
        let lastVisible = null;   // 현재 페이지의 마지막 데이터 (다음 페이지로 갈 때 기준점)
        let pageHistory = [];     // 이전 페이지로 돌아가기 위해 기준점들을 저장해두는 배열

        // 로그인 (기존과 동일)
        document.getElementById('loginBtn').addEventListener('click', () => {
            const id = document.getElementById('adminId').value;
            const pw = document.getElementById('adminPw').value;
            if(id === 'admin' && pw === '1234') {
                loginScreen.classList.add('hidden');
                dashboardScreen.classList.remove('hidden');
                dashboardScreen.classList.add('flex');
                
                // 로그인 성공 시 첫 페이지 불러오기
                fetchFirstPage(); 
            } else {
                alert('아이디나 비밀번호가 틀렸습니다.');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            location.reload();
        });

        /* =========================================
           HTML 특수문자 변환 (XSS 무력화)
        ========================================= */

        function escapeHTML(str) {
            return String(str).replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        /* =========================================
           데이터 렌더링 함수 (화면에 그리기)
        ========================================= */
        async function renderData(q) {
            reservationList.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-500">데이터를 불러오는 중입니다...</td></tr>';
            
            try {
                const querySnapshot = await getDocs(q);
                reservationList.innerHTML = '';

                if (querySnapshot.empty) {
                    reservationList.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-500">데이터가 없습니다.</td></tr>';
                    nextPageBtn.disabled = true; // 다음 페이지 없음
                    return;
                }

                // 이번 페이지의 마지막 데이터를 저장 (다음 페이지를 누를 때 이 다음부터 가져오기 위함)
                lastVisible = querySnapshot.docs[querySnapshot.docs.length - 1];

                // 가져온 데이터가 10개(PAGE_SIZE) 미만이면 다음 페이지가 없다는 뜻
                if (querySnapshot.docs.length < PAGE_SIZE) {
                    nextPageBtn.disabled = true;
                } else {
                    nextPageBtn.disabled = false;
                }

                querySnapshot.forEach((documentSnapshot) => {
                    const data = documentSnapshot.data();
                    const docId = documentSnapshot.id;
                    
                    let timeString = "-";
                    if(data.createdAt) {
                        const date = data.createdAt.toDate();
                        timeString = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
                    }

                    let statusColor = 'bg-yellow-100 text-yellow-700';
                    if(data.status === '예약완료') statusColor = 'bg-green-100 text-green-700';
                    else if(data.status === '미응답') statusColor = 'bg-red-100 text-red-700';

                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-gray-50 transition-colors';
                    tr.innerHTML = `
                        <td class="px-6 py-4 text-gray-500 text-xs">${timeString}</td>
                        <td class="px-6 py-4 font-bold text-gray-900">${escapeHTML(data.name)}</td>
                        <td class="px-6 py-4 font-medium">${escapeHTML(data.phone)}</td>
                        <td class="px-6 py-4 text-gray-600 font-bold">${escapeHTML(data.package)}</td>
                        <td class="px-6 py-4 text-center">
                            <select data-id="${docId}" class="status-select ${statusColor} font-bold text-xs px-3 py-1.5 rounded-full border-none outline-none cursor-pointer appearance-none text-center w-24">
                    // ... (이하 동일) ...
                                <option value="대기" ${data.status === '대기' ? 'selected' : ''}>대기</option>
                                <option value="예약완료" ${data.status === '예약완료' ? 'selected' : ''}>예약완료</option>
                                <option value="미응답" ${data.status === '미응답' ? 'selected' : ''}>미응답</option>
                            </select>
                        </td>
                    `;
                    reservationList.appendChild(tr);
                });

                // 상태 변경 이벤트
                document.querySelectorAll('.status-select').forEach(select => {
                    select.addEventListener('change', async function() {
                        const docId = this.getAttribute('data-id');
                        const newStatus = this.value;
                        try {
                            await updateDoc(doc(db, "reservations", docId), { status: newStatus });
                            alert('상태가 변경되었습니다.');
                            // 현재 페이지 번호에 맞춰 화면만 살짝 다시 그려줌
                            statusColorUpdate(this, newStatus);
                        } catch (error) {
                            alert("상태 변경에 실패했습니다.");
                        }
                    });
                });

                pageIndicator.innerText = `${currentPage} 페이지`;
                prevPageBtn.disabled = currentPage === 1;

            } catch (error) {
                reservationList.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-red-500">데이터 로드 실패</td></tr>';
            }
        }

        // 상태 변경 시 새로고침 대신 색상만 즉시 변경 (읽기 횟수 절약 핵심 로직!)
        function statusColorUpdate(selectElement, newStatus) {
            selectElement.classList.remove('bg-yellow-100', 'text-yellow-700', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
            if(newStatus === '대기') selectElement.classList.add('bg-yellow-100', 'text-yellow-700');
            else if(newStatus === '예약완료') selectElement.classList.add('bg-green-100', 'text-green-700');
            else if(newStatus === '미응답') selectElement.classList.add('bg-red-100', 'text-red-700');
        }

        /* =========================================
           페이지 네비게이션 제어 함수
        ========================================= */
        // 1. 처음 페이지 (1페이지) 불러오기
        async function fetchFirstPage() {
            currentPage = 1;
            pageHistory = [];
            const q = query(collection(db, "reservations"), orderBy("createdAt", "desc"), limit(PAGE_SIZE));
            await renderData(q);
        }

        // 2. 다음 페이지 (Next)
        nextPageBtn.addEventListener('click', async () => {
            if (!lastVisible) return;
            pageHistory.push(lastVisible); // 돌아올 때를 대비해 지금 페이지의 마지막 문서를 기록
            currentPage++;
            
            // lastVisible '다음'부터 10개 가져오기
            const q = query(collection(db, "reservations"), orderBy("createdAt", "desc"), startAfter(lastVisible), limit(PAGE_SIZE));
            await renderData(q);
        });

        // 3. 이전 페이지 (Prev)
        prevPageBtn.addEventListener('click', async () => {
            if (currentPage <= 1) return;
            currentPage--;
            pageHistory.pop(); // 현재 기록 빼기
            
            const prevLastVisible = pageHistory.length > 0 ? pageHistory[pageHistory.length - 1] : null;

            let q;
            if (prevLastVisible) {
                // 이전 페이지의 시작점부터 다시 10개
                q = query(collection(db, "reservations"), orderBy("createdAt", "desc"), startAfter(prevLastVisible), limit(PAGE_SIZE));
            } else {
                // 기록이 없으면 1페이지
                q = query(collection(db, "reservations"), orderBy("createdAt", "desc"), limit(PAGE_SIZE));
            }
            await renderData(q);
        });
    </script>
</body>
</html>
