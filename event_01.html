    <style>
        body { -webkit-tap-highlight-color: transparent; }
        
        details[open] summary ~ div {
            animation: sweep 0.4s ease-in-out;
        }
        @keyframes sweep {
            0%    { opacity: 0; transform: translateY(-10px); }
            100%  { opacity: 1; transform: translateY(0); }
        }
        
        /* 라디오 버튼 선택 시 카드 스타일 자동 전환 (Pure CSS) */
        .package-card { 
            border: 1px solid #E5E7EB;
            background-color: #ffffff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .package-card:hover {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .package-card:has(input[type="radio"]:checked) {
            border: 2px solid #F27405;
            background-color: rgba(255, 247, 237, 0.5); /* orange-50/50 */
        }
        .package-card:has(input[type="radio"]:checked) .price-val {
            color: #F27405 !important;
        }
    </style>
