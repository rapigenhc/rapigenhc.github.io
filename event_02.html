<body class="bg-white text-gray-900 pb-32 overflow-x-hidden">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-md md:max-w-4xl mx-auto px-4 h-14 flex items-center justify-between">

    <main class="max-w-md md:max-w-4xl mx-auto bg-white min-h-screen">

                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                홈

            <span>></span>
            <span>국가검진</span>
            <span>></span>
            <span class="font-bold text-gray-900">마이핏 MyFit 검진</span>
        </div>

        <div class="px-4 py-6">
            <div class="flex flex-col md:flex-row gap-6 mb-10 pb-8 border-b border-gray-200" data-aos="fade-up">
                <div class="w-full md:w-1/2 aspect-square md:aspect-[4/3] bg-pink-50 rounded-2xl flex items-center justify-center">
                    <span class="text-pink-300 font-bold">MAIN IMAGE</span>
                </div>
                <div class="w-full md:w-1/2 flex flex-col justify-center relative">
                    <span class="absolute top-0 right-0 bg-gray-100 text-gray-600 px-2 py-1 rounded text-[10px] font-bold">~2026.5.31</span>
                    <h2 class="text-3xl font-black mb-3">마이핏 MyFit 검진</h2>
                    <p class="text-gray-600 mb-4 text-sm md:text-base">생활밀착형 나에게 꼭 맞는 패키지</p>
                    <div class="flex gap-1.5 mb-6 flex-wrap">
                        <span class="badge-light border border-gray-200 bg-gray-50 text-gray-600">당뇨</span>
                        <span class="badge-light border border-gray-200 bg-gray-50 text-gray-600">간건강</span>
                        <span class="badge-light border border-gray-200 bg-gray-50 text-gray-600">흡연</span>
                        <span class="badge-light border border-gray-200 bg-gray-50 text-gray-600">고혈압</span>
                    </div>
                    <div class="text-3xl font-black">100,000<span class="text-lg font-normal ml-1">원~</span></div>
                </div>
            </div>

            <div class="mb-8 space-y-4" data-aos="fade-up" data-aos-delay="100">
                <h3 class="font-bold text-lg mb-4">원하시는 패키지를 선택해주세요</h3>
                
                <label class="package-card flex items-start gap-3 p-4 border-2 border-[#F27405] rounded-xl bg-orange-50/30 cursor-pointer transition-all">
                    <div class="pt-1">
                        <input type="checkbox" checked class="package-checkbox w-5 h-5 accent-[#F27405] cursor-pointer">
                    </div>
                    <div class="flex-1">
                        <p class="text-[15px] text-gray-800 mb-1.5 leading-relaxed font-bold">😮‍💨 소화기능이 걱정된다면?</p>
                        <h3 class="text-xl font-bold mb-2">속편안 패키지</h3>
                        <p class="text-sm text-gray-600 mb-2 leading-relaxed font-medium">
                            <span class="badge-light border border-gray-200 bg-white text-gray-600 mr-1.5">검사 항목</span>
                            국가검진 + 수면위대장내시경
                        </p>
                        <div class="text-right mt-3">
                            <del class="text-gray-400 text-sm block mb-0.5">정상가 1,000,000원</del>
                            <div class="text-2xl font-black text-[#F27405]">170,000<span class="text-base font-bold text-gray-800 ml-0.5">원</span></div>
                        </div>
                    </div>
                </label>

                <label class="package-card flex items-start gap-3 p-4 border border-gray-200 rounded-xl bg-white hover:bg-gray-50 cursor-pointer transition-all">
                    <div class="pt-1">
                        <input type="checkbox" class="package-checkbox w-5 h-5 accent-[#F27405] cursor-pointer">
                    </div>
                    <div class="flex-1">
                        <p class="text-[15px] text-gray-800 mb-1.5 leading-relaxed font-bold">🚬 잦은 기침과 미세먼지가 신경쓰인다면?</p>
                        <h3 class="text-xl font-bold mb-2">숨편안 패키지</h3>
                        <p class="text-sm text-gray-600 mb-2 leading-relaxed font-medium">
                            <span class="badge-light border border-gray-200 bg-gray-50 text-gray-600 mr-1.5">검사 항목</span>
                            국가검진 + 폐CT + 종양표지자 4종
                        </p>
                        <div class="text-right mt-3">
                            <del class="text-gray-400 text-sm block mb-0.5">정상가 1,000,000원</del>
                            <div class="text-2xl font-black text-gray-900">130,000<span class="text-base font-bold text-gray-800 ml-0.5">원</span></div>
                        </div>
                    </div>
                </label>

                <label class="package-card flex items-start gap-3 p-4 border border-gray-200 rounded-xl bg-white hover:bg-gray-50 cursor-pointer transition-all">
                    <div class="pt-1">
                        <input type="checkbox" class="package-checkbox w-5 h-5 accent-[#F27405] cursor-pointer">
                    </div>
                    <div class="flex-1">
                        <p class="text-[15px] text-gray-800 mb-1.5 leading-relaxed font-bold">🍻 잦은 회식과 만성 피로에 시달린다면?</p>
                        <h3 class="text-xl font-bold mb-2">간당간당 패키지</h3>
                        <div class="text-sm text-gray-600 mb-2 leading-relaxed font-medium flex items-start">
                            <span class="badge-light border border-gray-200 bg-gray-50 text-gray-600 mr-2 shrink-0 mt-0.5">검사 항목</span>
                            <span>국가검진 + 상복부초음파(간, 담낭, 췌장, 비장, 신장) + 당뇨(glucose, 당화혈색소 hba1c) + 혈청지오티AST(SGOT)/간염, 심근경색 + 혈청지피티ALT(SGPT)/간염 + 감마지티피r-GTP(GGT)/지방간, 알콜성간염 + 간섬유화정밀초음파</span>
                        </div>
                        <div class="text-right mt-3">
                            <del class="text-gray-400 text-sm block mb-0.5">정상가 1,000,000원</del>
                            <div class="text-2xl font-black text-gray-900">170,000<span class="text-base font-bold text-gray-800 ml-0.5">원</span></div>
                        </div>
                    </div>
                </label>

                <label class="package-card flex items-start gap-3 p-4 border border-gray-200 rounded-xl bg-white hover:bg-gray-50 cursor-pointer transition-all">
                    <div class="pt-1">
                        <input type="checkbox" class="package-checkbox w-5 h-5 accent-[#F27405] cursor-pointer">
                    </div>
                    <div class="flex-1">
                        <p class="text-[15px] text-gray-800 mb-1.5 leading-relaxed font-bold">🌸 건강한 중년을 준비하는 여성을 위한</p>
                        <h3 class="text-xl font-bold mb-2">갱년기 안심 패키지</h3>
                        <p class="text-sm text-gray-600 mb-2 leading-relaxed font-medium flex items-start">
                            <span class="badge-light border border-gray-200 bg-gray-50 text-gray-600 mr-2 shrink-0 mt-0.5">검사 항목</span>
                            <span>국가검진 + 초음파(자궁) + 자궁경부암 + HPV + 여성호르몬(황체형성호르몬(LH), 에스트라디올(E2), 난포자극호르몬(FSH))</span>
                        </p>
                        <div class="text-right mt-3">
                            <del class="text-gray-400 text-sm block mb-0.5">정상가 1,000,000원</del>
                            <div class="text-2xl font-black text-gray-900">170,000<span class="text-base font-bold text-gray-800 ml-0.5">원</span></div>
                        </div>
                    </div>
                </label>

                <label class="package-card flex items-start gap-3 p-4 border border-gray-200 rounded-xl bg-white hover:bg-gray-50 cursor-pointer transition-all">
                    <div class="pt-1">
                        <input type="checkbox" class="package-checkbox w-5 h-5 accent-[#F27405] cursor-pointer">

                    <div class="flex-1">
                        <p class="text-[15px] text-gray-800 mb-1.5 leading-relaxed font-bold">🩸 단 한 번의 채혈로 전신 건강을 체크!</p>

                            <span class="badge-light border border-gray-200 bg-gray-50 text-gray-600 mr-1.5">검사 항목</span>
                            국가검진 + 혈액소변종합검사 80여종(종양표지자 포함)
                        </p>
                        <div class="text-right mt-3">
                            <del class="text-gray-400 text-sm block mb-0.5">정상가 1,000,000원</del>
                            <div class="text-2xl font-black text-gray-900">100,000<span class="text-base font-bold text-gray-800 ml-0.5">원</span></div>
                        </div>
                    </div>
                </label>

                <label class="package-card flex items-start gap-3 p-4 border border-gray-200 rounded-xl bg-white hover:bg-gray-50 cursor-pointer transition-all">
                    <div class="pt-1">
                        <input type="checkbox" class="package-checkbox w-5 h-5 accent-[#F27405] cursor-pointer">
                    </div>
                    <div class="flex-1">
                        <p class="text-[15px] text-gray-800 mb-1.5 leading-relaxed font-bold">🩺 발견이 어려운 침묵의 장기, 정밀 점검</p>
                        <h3 class="text-xl font-bold mb-2">췌장안심 패키지</h3>
                        <p class="text-sm text-gray-600 mb-2 leading-relaxed font-medium">
                            <span class="badge-light border border-gray-200 bg-gray-50 text-gray-600 mr-1.5">검사 항목</span>
                            국가검진 + 췌장MRI + 종양표지자 4종
                        </p>
                        <div class="text-right mt-3">
                            <del class="text-gray-400 text-sm block mb-0.5">정상가 1,000,000원</del>
                            <div class="text-2xl font-black text-gray-900">280,000<span class="text-base font-bold text-gray-800 ml-0.5">원</span></div>
                        </div>
                    </div>
                </label>
            </div>
            
            <article class="prose max-w-none text-gray-700">
                <p>여기에 에디터로 작성한 마크다운/HTML 형식의 본문 내용이 들어갑니다.</p>
            </article>

    <div id="common-footer-container"></div>

            AOS.init({
