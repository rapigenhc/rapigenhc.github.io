        /* 기본 설정 */
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }

        /* 형광펜 효과 */
        .highlight-pink {
            background: linear-gradient(180deg, rgba(255,255,255,0) 50%, #FFD6E8 50%);
            display: inline;
        }

        /* 솔리드 그림자 효과 (플랫 디자인 특화) */
        .solid-shadow {
            box-shadow: 6px 6px 0px rgba(0,0,0,1);
        }
        .solid-shadow-sm {
            box-shadow: 3px 3px 0px rgba(0,0,0,1);
        }

        /* 모션 애니메이션 클래스 (AOS 대체) */
        .reveal-hidden {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 아코디언 애니메이션 */
        details[open] summary ~ div {
            animation: sweep 0.3s ease-in-out;
        }
        @keyframes sweep {
            0%    { opacity: 0; transform: translateY(-5px); }
            100%  { opacity: 1; transform: translateY(0); }
        }
        
        /* 패키지 카드 상태 변경 스타일 (체크 시) */
        .package-card { 
            transition: all 0.2s ease-in-out; 
        }
        /* 체크된 카드의 테두리 및 배경색 변경 */
        .package-card:has(.package-checkbox:checked) {
            border-color: #0047FF !important;
            background-color: #F0F4FF !important;
            box-shadow: 6px 6px 0px #0047FF !important;
            transform: translateY(-2px);
        }
        /* 체크된 카드의 가격 및 강조 텍스트 색상 변경 */
        .package-card:has(.package-checkbox:checked) .price-val,
        .package-card:has(.package-checkbox:checked) .package-title {
            color: #0047FF !important;
        }
        .package-card:has(.package-checkbox:checked) .point-text {
            color: #0047FF !important;
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 아코디언 아이콘 변경 로직
            const detailsElements = document.querySelectorAll('details');
            detailsElements.forEach(detail => {
                detail.addEventListener('toggle', (e) => {
                    const svgPath = detail.querySelector('summary svg path');
                    if (detail.open) {
                        svgPath.setAttribute('d', 'M20 12H4'); // 마이너스 아이콘
                    } else {
                        svgPath.setAttribute('d', 'M12 6v6m0 0v6m0-6h6m-6 0H6'); // 플러스 아이콘
                    }
                });
            });

            // 스크롤 시 등장 애니메이션 (AOS 대체)
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach((entry, index) => {
                    if (entry.isIntersecting) {
                        // 순차적 등장을 위해 약간의 딜레이 추가
                        setTimeout(() => {
                            entry.target.classList.add('reveal-active');
                        }, index * 100);
                        observer.unobserve(entry.target); // 한 번만 실행
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.reveal-hidden').forEach(el => {
                observer.observe(el);
            });
        });
    </script>
