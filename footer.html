<footer class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] z-40" id="bottom-form">
    <div class="max-w-md md:max-w-4xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center gap-3">
        
        <div class="flex items-center gap-2 w-full md:w-auto shrink-0 mb-2 md:mb-0 relative">
            <input type="checkbox" id="agree" checked class="w-4 h-4 accent-[#F27405] cursor-pointer">
            <span onclick="openPrivacyModal()" class="text-xs text-gray-600 cursor-pointer font-medium underline underline-offset-2 hover:text-gray-900">개인정보수집 이용 동의 (필수)</span>
            <div id="tip-agree" class="speech-bubble" style="bottom: 150%; left: 30%;">동의가 필요합니다</div>
        </div>
        
        <div class="flex flex-col md:flex-row flex-1 gap-2 w-full">
            
            <div class="flex gap-2 w-full md:flex-1">
                <div class="relative w-1/3">
                    <input type="text" id="userName" placeholder="이름" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded text-sm focus:outline-none focus:border-[#F27405] focus:bg-white transition">
                    <div id="tip-name" class="speech-bubble">이름을 입력해주세요</div>
                </div>
                
                <div class="relative w-2/3">
                    <input type="tel" id="userPhone" placeholder="휴대폰 번호 (-없이)" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded text-sm focus:outline-none focus:border-[#F27405] focus:bg-white transition">
                    <div id="tip-phone" class="speech-bubble">휴대폰 번호를 입력해주세요</div>
                </div>
            </div>
            
            <button onclick="submitForm()" class="w-full md:w-auto px-6 py-2.5 bg-[#F27405] text-white text-sm font-bold rounded hover:bg-orange-600 transition-colors active:scale-95 shrink-0">
                상담 접수하기
            </button>
            
        </div>
    </div>
</footer>

<div id="successModal" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center backdrop-blur-sm">
    <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 text-center">
        <div class="w-16 h-16 bg-orange-100 text-[#F27405] rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h3 class="text-xl font-bold mb-2">접수가 완료되었습니다</h3>
        <p class="text-gray-500 text-sm mb-6">순차적으로 연락드리고 있으니<br>조금만 기다려주세요.</p>
        <button onclick="closeModal()" class="w-full bg-gray-900 text-white font-bold py-3 rounded-lg hover:bg-black">확인</button>
    </div>
</div>

<div id="alertModal" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center backdrop-blur-sm">
    <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 text-center">
        <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        <h3 class="text-xl font-bold mb-2">알림</h3>
        <p id="alertMessage" class="text-gray-600 text-sm mb-6">여기에 경고 메시지가 들어갑니다.</p>
        <button onclick="closeAlertModal()" class="w-full bg-gray-900 text-white font-bold py-3 rounded-lg hover:bg-black transition-colors">확인</button>
    </div>
</div>

<div id="privacyModal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center backdrop-blur-sm transition-opacity">
    <div class="bg-white rounded-2xl p-6 md:p-8 max-w-sm w-full mx-4 relative shadow-2xl">
        <button onclick="closePrivacyModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-900 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <h3 class="text-lg font-bold mb-4 text-gray-900">개인정보 수집 및 이용 동의</h3>
        <div class="text-sm text-gray-600 space-y-3 mb-6 bg-gray-50 p-4 rounded-lg border border-gray-100 leading-relaxed">
            <p><strong class="text-gray-800">1. 수집 항목:</strong> 이름, 휴대폰 번호</p>
            <p><strong class="text-gray-800">2. 수집 및 이용 목적:</strong> 건강검진 이벤트 상담, 예약 확인 및 안내</p>
            <p><strong class="text-gray-800">3. 보유 및 이용 기간:</strong> 상담 완료 후 6개월 보관 후 파기</p>
            <p class="text-xs text-gray-400 mt-3">* 동의를 거부할 권리가 있으나, 거부 시 이벤트 상담 및 예약이 제한될 수 있습니다.</p>
        </div>
        <button onclick="closePrivacyModal()" class="w-full bg-[#F27405] text-white font-bold py-3 rounded-lg hover:bg-orange-600 transition-colors active:scale-95">확인했습니다</button>
    </div>
</div>
